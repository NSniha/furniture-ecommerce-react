<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ==================== Basic document metadata ==================== -->

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <meta
      name="description"
      content="Discover thoughtfully curated furniture, home decor, lighting, rugs, wall art, and interior inspiration at Decorist."
    />

    <meta
      name="keywords"
      content="Decorist, furniture, home decor, interior design, living room furniture, bedroom furniture, lighting, rugs, wall art"
    />

    <meta name="author" content="Decorist" />
    <meta name="application-name" content="Decorist" />
    <meta name="generator" content="React and Vite" />

    <!-- ==================== Search engine directives ==================== -->

    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- ==================== Favicons ==================== -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ==================== Canonical URL ==================== -->

    <link id="canonical-link" rel="canonical" href="/" />

    <!-- ==================== Open Graph metadata ==================== -->

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Decorist" />
    <meta property="og:locale" content="en_US" />

    <meta
      property="og:title"
      content="Decorist | Thoughtful Furniture & Home Decor"
    />

    <meta
      property="og:description"
      content="Discover thoughtfully curated furniture, home decor, lighting, rugs, wall art, and interior inspiration at Decorist."
    />

    <meta property="og:url" content="/" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta
      property="og:image:alt"
      content="Decorist furniture and home decor collection"
    />

    <!-- ==================== Twitter metadata ==================== -->

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Decorist | Thoughtful Furniture & Home Decor"
    />

    <meta
      name="twitter:description"
      content="Discover thoughtfully curated furniture, home decor, lighting, rugs, wall art, and interior inspiration at Decorist."
    />

    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- ==================== Mobile application metadata ==================== -->

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta name="apple-mobile-web-app-title" content="Decorist" />

    <!-- ==================== Default page title ==================== -->

    <title>Decorist | Thoughtful Furniture & Home Decor</title>
